<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>2doApp Login</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
  <body class="bg-[#0e1237] min-h-screen text-[#f3f4f6]">
    <!-- Navbar -->
    <div class="navbar navbar-mustard shadow-xl px-4 sticky top-0 z-50">
        <a class="btn btn-ghost normal-case text-2xl font-black tracking-tighter" href="index.html">2doApp</a>

      <div class="flex-none">
        <ul class="menu menu-horizontal px-1 font-bold">
          <li><a href="index.html">Home</a></li>
          <li><a href="blog.html">The Guide</a></li>
          <li><a href="login.html" class="active">Login</a></li>
        </ul>
      </div>
    </div>

    <main class="hero min-h-[80vh] px-4">
      <div class="hero-content flex-col lg:flex-row-reverse max-w-6xl">
        <div class="text-center lg:text-left lg:ml-12 lg:border-l-4 lg:border-[#ebd740] lg:pl-8 py-4">
          <h1 class="text-7xl font-black text-[#ebd740] tracking-tighter mb-4">Master Your Day.</h1>
          <p class="text-2xl text-white/80 max-w-md font-light">Join thousands using 2doApp to organize their daily tasks and ambitions.</p>

          <div class="mt-8 hidden lg:block">
            <img src="images/todo_app_hero_1773331366211.png" alt="Productivity" class="rounded-3xl shadow-2xl border border-white/10 w-full object-cover max-h-[300px]" />
          </div>
        </div>
        
        <div class="card w-full max-w-md shadow-2xl bg-white/5 backdrop-blur-xl border border-white/10 rounded-[2.5rem]">
          <div class="card-body p-10">
            <h2 class="text-3xl font-bold text-center mb-6 text-[#ebd740]">Access Your 2doApp</h2>

            <div id="auth-error" class="alert alert-error hidden mb-6 rounded-2xl">
              <span id="error-message"></span>
            </div>
            
            <div class="form-control">
              <label class="label">
                <span class="label-text text-white/70">Email Address</span>
              </label>
              <input type="email" id="email" placeholder="you@example.com" class="input input-lg input-bordered bg-white/5 border-white/10 focus:border-[#ebd740] text-white rounded-2xl" required />
            </div>
            
            <div class="form-control mt-4">
              <label class="label">
                <span class="label-text text-white/70">Password</span>
              </label>
              <input type="password" id="password" placeholder="••••••••" class="input input-lg input-bordered bg-white/5 border-white/10 focus:border-[#ebd740] text-white rounded-2xl" required />
            </div>
            
            <div class="form-control mt-10 space-y-4">
              <button id="login-btn" class="btn btn-lg bg-[#ebd740] border-none text-[#0e1237] hover:bg-[#d4c13a] rounded-2xl font-bold">Sign In</button>
              <div class="divider text-white/20">OR</div>
              <button id="signup-btn" class="btn btn-lg btn-outline border-white/20 text-white hover:bg-white/5 rounded-2xl">Create New Account</button>

              <div class="pt-4">
                <a href="index.html" class="btn btn-lg btn-ghost w-full bg-[#ebd740] text-[#0e1237] hover:bg-[#d4c13a] rounded-2xl font-bold shadow-lg">
                  Continue as Guest 
                </a>
                <p class="text-center text-white/40 text-sm mt-3 italic">No account needed to start</p>
              </div>

            </div>

          </div>
        </div>
      </div>
    </main>

    <footer class="py-12 px-4 border-t border-white/5 opacity-60 text-center space-y-4">
      <p class="text-lg font-medium text-[#ebd740]">Created with ♥️ by Diane B • Ontario, Canada</p>
      <div class="flex justify-center gap-6 text-sm">
        <a href="terms.html" class="link link-hover">Terms & Conditions</a>
      </div>
    </footer>

    <!-- Supabase and Auth Logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script>
      const loginBtn = document.getElementById('login-btn');
      const signupBtn = document.getElementById('signup-btn');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const errorDiv = document.getElementById('auth-error');
      const errorMessage = document.getElementById('error-message');

      function showError(msg) {
        errorMessage.innerText = msg;
        errorDiv.classList.remove('hidden');
      }

      function setButtonLoading(btn, isLoading) {
        if (isLoading) {
          btn.innerHTML = '<span class="loading loading-spinner"></span> Processing...';
          btn.classList.add('btn-disabled');
        } else {
          btn.innerHTML = btn.id === 'login-btn' ? 'Sign In' : 'Create New Handbook';
          btn.classList.remove('btn-disabled');
        }
      }

      loginBtn.addEventListener('click', async () => {
        errorDiv.classList.add('hidden');
        const email = emailInput.value;
        const password = passwordInput.value;
        
        if (!email || !password) {
            showError("Please fill in all fields.");
            return;
        }

        setButtonLoading(loginBtn, true);
        try {
          await signInUser(email, password);
          window.location.href = 'index.html';
        } catch (err) {
          showError(err.message);
          setButtonLoading(loginBtn, false);
        }
      });

      signupBtn.addEventListener('click', async () => {
        errorDiv.classList.add('hidden');
        const email = emailInput.value;
        const password = passwordInput.value;

        if (!email || !password) {
            showError("Please fill in all fields.");
            return;
        }

        setButtonLoading(signupBtn, true);
        try {
          await signUpUser(email, password);
          alert('Handbook account created! Check your email for a verification link.');
          setButtonLoading(signupBtn, false);
        } catch (err) {
          showError(err.message);
          setButtonLoading(signupBtn, false);
        }
      });
    </script>
</body>
</html>
