<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2DOApp - Chic Productivity</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js" defer></script>
    <script src="app.js" defer></script> 
</head>

  <body class="bg-[#0e1237] min-h-screen text-[#f3f4f6]">
    <!-- Navbar -->
    <div class="navbar navbar-mustard shadow-xl px-4 sticky top-0 z-50">
        <a class="btn btn-ghost normal-case text-2xl font-black tracking-tighter text-[#0e1237]" href="index.html">2doApp</a>

      <div class="flex-none">
        <ul id="auth-links" class="menu menu-horizontal px-1 font-bold">
          <!-- Populated by app.js -->
        </ul>
      </div>

    </div>

    <main class="relative pt-12 pb-24 px-4">
      <div class="max-w-4xl mx-auto text-center mb-16">
        <h1 class="text-6xl font-black text-[#ebd740] mb-4 tracking-tight">Your 2doApp</h1>
        <p id="welcome-msg" class="text-xl text-white/70 italic">Organizing your world, one task at a time.</p>
      </div>


      <!-- Main Container -->
      <div class="wrapper glass border-white/10 shadow-2xl rounded-[2.5rem] p-8 max-w-2xl mx-auto relative z-10">
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-2xl font-bold text-[#ebd740]">Active Tasks</h2>
            <div id="date-display" class="text-white/50 font-medium"></div>
        </div>

        <form class="form-control flex flex-row gap-3 mb-10">
          <input
            id="todo-input"
            type="text"
            placeholder="Write into your handbook..."
            class="input input-lg input-bordered bg-white/5 border-white/10 focus:border-[#ebd740] text-white flex-grow rounded-2xl transition-all"
            autocomplete="off"
          />
          <button id="add-button" class="btn btn-lg bg-[#ebd740] border-none text-[#0e1237] hover:bg-[#d4c13a] rounded-2xl px-10 font-bold">ADD</button>
        </form>

        <ul id="todo-list" class="space-y-4">
          <!-- Dynamically populated by app.js -->
        </ul> 
      </div>
      
      <!-- Decorative Background Elements -->
      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-[#ebd740]/5 rounded-full blur-[120px] -z-10"></div>
    </main>

    <script>
      // Display current date
      const dateDisplay = document.getElementById('date-display');
      const options = { weekday: 'long', month: 'long', day: 'numeric' };
      dateDisplay.innerText = new Date().toLocaleDateString('en-US', options);
    </script>
</body>
</html>
